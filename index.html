<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a0e06;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  .bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(180, 80, 10, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(210, 120, 20, 0.12) 0%, transparent 50%),
      #1a0e06;
  }

  .noise {
    position: fixed; inset: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  .ticket {
    position: relative;
    width: 340px;
    background: linear-gradient(145deg, #2a1505, #1e0e04);
    border: 1px solid rgba(210, 140, 50, 0.3);
    border-radius: 2px;
    padding: 48px 40px 44px;
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 30px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(220, 160, 60, 0.15);
    animation: fadeUp 0.8s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ticket::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(210,140,50,0.2), transparent);
    pointer-events: none;
  }

  .notch {
    position: absolute;
    width: 18px; height: 18px;
    background: #1a0e06;
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
    border: 1px solid rgba(210,140,50,0.15);
  }
  .notch.left { left: -9px; }
  .notch.right { right: -9px; }

  .label {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(210, 140, 50, 0.6);
    margin-bottom: 18px;
  }

  .drink-icon {
    font-size: 38px;
    margin-bottom: 14px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(210,140,50,0.3));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: #e8c87a;
    letter-spacing: 0.5px;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    font-weight: 300;
    color: rgba(220, 180, 100, 0.5);
    letter-spacing: 1px;
    margin-bottom: 32px;
    font-style: italic;
  }

  .divider {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(210,140,50,0.4), transparent);
    margin: 0 auto 32px;
  }

  .claim-btn {
    display: inline-block;
    width: 100%;
    padding: 15px 0;
    background: linear-gradient(135deg, #c07a20, #9a5e10);
    color: #fff8ec;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 5px;
    text-transform: uppercase;
    border: none;
    border-radius: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(180, 100, 10, 0.3);
    position: relative;
    overflow: hidden;
  }

  .claim-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .claim-btn:hover::before { opacity: 1; }
  .claim-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(180, 100, 10, 0.45);
  }
  .claim-btn:active { transform: translateY(0); }

  .claim-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .success {
    display: none;
    animation: fadeUp 0.5s ease both;
  }

  .success-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 12px;
  }

  .success h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: #e8c87a;
    margin-bottom: 8px;
  }

  .success p {
    font-size: 13px;
    color: rgba(220, 180, 100, 0.55);
    font-style: italic;
    line-height: 1.6;
  }

  .status-msg {
    margin-top: 14px;
    font-size: 11px;
    color: rgba(210,140,50,0.5);
    letter-spacing: 1px;
    min-height: 16px;
  }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid rgba(210,140,50,0.3);
    border-top-color: #c07a20;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .ticket-num {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(210,140,50,0.25);
    margin-top: 28px;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="noise"></div>

<div class="ticket">
  <div class="notch left"></div>
  <div class="notch right"></div>

  <div id="main-content">
    <div class="label">One Evening · One Offer</div>
    <span class="drink-icon">🍹</span>
    <h1>Amaretto Sours</h1>
    <p class="subtitle">a standing invitation</p>
    <div class="divider"></div>

    <button class="claim-btn" id="claimBtn" onclick="handleClaim()">Claim</button>
    <div class="status-msg" id="statusMsg"></div>
    <div class="ticket-num">№ 001 — Limited</div>
  </div>

  <div class="success" id="successContent">
    <span class="success-icon">✉️</span>
    <h2>Claimed.</h2>
    <p>Your request has been sent.<br>Expect to hear back soon.</p>
  </div>
</div>

<script>
async function handleClaim() {
  const btn = document.getElementById('claimBtn');
  const statusMsg = document.getElementById('statusMsg');

  btn.disabled = true;
  statusMsg.innerHTML = '<span class="spinner"></span>Sending...';

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: "Send an email to Sebastianoriva02@gmail.com with subject 'Someone claimed their Amaretto Sours! 🍹' and body: 'Hey Seb! Someone has claimed their Amaretto Sours and wants to schedule a date. Time to make a plan! 🍹✨'. Use the Gmail MCP tool to send it. Just send it, no explanation needed."
        }],
        mcp_servers: [{
          type: "url",
          url: "https://gmailmcp.googleapis.com/mcp/v1",
          name: "gmail-mcp"
        }]
      })
    });

    const data = await response.json();
    console.log("API response:", JSON.stringify(data));

    if (data.error) {
      throw new Error(data.error.message || 'API error');
    }

    // Show success state
    document.getElementById('main-content').style.display = 'none';
    const successEl = document.getElementById('successContent');
    successEl.style.display = 'block';

  } catch (err) {
    console.error(err);
    statusMsg.textContent = 'Something went wrong. Try again.';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
