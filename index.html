<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a0e06;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  .bg {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(180, 80, 10, 0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 30%, rgba(210, 120, 20, 0.12) 0%, transparent 50%),
      #1a0e06;
  }

  .noise {
    position: fixed; inset: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'%3E%3C/feTurbulence%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='256' height='256' fill='white' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  .ticket {
    position: relative;
    width: 340px;
    background: linear-gradient(145deg, #2a1505, #1e0e04);
    border: 1px solid rgba(210, 140, 50, 0.3);
    border-radius: 2px;
    padding: 48px 40px 44px;
    text-align: center;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 30px 80px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(220, 160, 60, 0.15);
    animation: fadeUp 0.8s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .ticket::before {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(210,140,50,0.2), transparent);
    pointer-events: none;
  }

  .notch {
    position: absolute;
    width: 18px; height: 18px;
    background: #1a0e06;
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
    border: 1px solid rgba(210,140,50,0.15);
  }
  .notch.left { left: -9px; }
  .notch.right { right: -9px; }

  .label {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(210, 140, 50, 0.6);
    margin-bottom: 18px;
  }

  .drink-icon {
    font-size: 38px;
    margin-bottom: 14px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(210,140,50,0.3));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: #e8c87a;
    letter-spacing: 0.5px;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 13px;
    font-weight: 300;
    color: rgba(220, 180, 100, 0.5);
    letter-spacing: 1px;
    margin-bottom: 32px;
    font-style: italic;
  }

  .divider {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(210,140,50,0.4), transparent);
    margin: 0 auto 32px;
  }

  .claim-btn {
    display: inline-block;
    width: 100%;
    padding: 15px 0;
    background: linear-gradient(135deg, #c07a20, #9a5e10);
    color: #fff8ec;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 5px;
    text-transform: uppercase;
    border: none;
    border-radius: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(180, 100, 10, 0.3);
    position: relative;
    overflow: hidden;
  }

  .claim-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .claim-btn:hover::before { opacity: 1; }
  .claim-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(180, 100, 10, 0.45);
  }
  .claim-btn:active { transform: translateY(0); }

  .claim-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .success {
    display: none;
    animation: fadeUp 0.5s ease both;
  }

  .success-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 12px;
  }

  .success h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: #e8c87a;
    margin-bottom: 8px;
  }

  .success p {
    font-size: 13px;
    color: rgba(220, 180, 100, 0.55);
    font-style: italic;
    line-height: 1.6;
  }

  .ticket-num {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(210,140,50,0.25);
    margin-top: 28px;
  }

  /* Modal Styles */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(2px);
    z-index: 1000;
    animation: fadeIn 0.3s ease;
  }

  .modal-overlay.show {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-content {
    background: linear-gradient(145deg, #2a1505, #1e0e04);
    border: 1px solid rgba(210, 140, 50, 0.3);
    border-radius: 2px;
    padding: 40px;
    text-align: center;
    max-width: 320px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.5),
      0 30px 80px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(220, 160, 60, 0.15);
    animation: slideUp 0.4s ease;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .modal-icon {
    font-size: 44px;
    margin-bottom: 16px;
    display: block;
  }

  .modal-content h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: #e8c87a;
    margin-bottom: 12px;
    font-weight: 700;
  }

  .modal-content p {
    font-size: 13px;
    color: rgba(220, 180, 100, 0.65);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .modal-btn {
    display: inline-block;
    padding: 12px 32px;
    background: linear-gradient(135deg, #c07a20, #9a5e10);
    color: #fff8ec;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: none;
    border-radius: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(180, 100, 10, 0.3);
  }

  .modal-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(180, 100, 10, 0.45);
  }

  .modal-btn:active {
    transform: translateY(0);
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="noise"></div>

<div class="ticket">
  <div class="notch left"></div>
  <div class="notch right"></div>

  <div id="main-content">
    <div class="label">One Evening · One Offer</div>
    <span class="drink-icon">🍹</span>
    <h1>Amaretto Sours</h1>
    <p class="subtitle">a standing invitation</p>
    <div class="divider"></div>

    <button class="claim-btn" id="claimBtn" onclick="handleClaim()">Claim</button>
    <div class="ticket-num">№ 001 — Limited</div>
  </div>
</div>

<!-- Modal Popup -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <span class="modal-icon">✓</span>
    <h2>Ticket Claimed!</h2>
    <p>Your ticket has been claimed.<br>The host will reach out to you soon.</p>
    <button class="modal-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
function handleClaim() {
  const btn = document.getElementById('claimBtn');
  btn.disabled = true;
  
  // Show the modal popup
  const modal = document.getElementById('modalOverlay');
  modal.classList.add('show');
}

function closeModal() {
  const modal = document.getElementById('modalOverlay');
  modal.classList.remove('show');
}

// Close modal when clicking outside of it
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) {
    closeModal();
  }
});
</script>
</body>
</html>
